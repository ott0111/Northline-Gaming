<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Become a Creator — Northline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--void:#fff;--bearing:#050505;--edge:clamp(24px,6vw,64px);--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--border:rgba(0,0,0,0.08);--text-2:#55575c;--radius-md:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);color:var(--bearing);background:var(--void)}
.wrap{max-width:960px;margin:0 auto;padding:120px var(--edge)}
.nav{position:fixed;top:0;left:0;right:0;padding:18px var(--edge);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid transparent}
.logo{font-family:var(--display);font-weight:700}
.card{background:rgba(0,0,0,0.03);border:1px solid var(--border);padding:36px;border-radius:var(--radius-md)}
.input,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:0.95rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:12px;align-items:center;margin-top:16px}
.btn{display:inline-block;padding:12px 18px;border-radius:100px;background:var(--bearing);color:#fff;border:none;cursor:pointer}
.help{color:var(--text-2);font-size:0.95rem;margin-top:10px}
@media(max-width:700px){.form-grid{grid-template-columns:1fr}}
</style>
<style>
.site-logo{height:34px}
.ad-slot{display:flex;align-items:center;justify-content:center;background:var(--surface,#f6f6f7);border:1px dashed var(--border);padding:12px;border-radius:10px;color:var(--text-2);min-height:88px}
@media (max-width:700px){ .ad-slot{min-height:64px} }
</style>
</style>
</head>
<body>
<nav class="nav" id="mainNav"><div class="logo"><img src="assets/Northlineee.jpg" alt="Northline" class="site-logo" style="height:28px;margin-right:8px">NORTHLINE</div><div></div></nav>
<div class="wrap">
  <h1 style="font-family:var(--display);font-size:2.4rem;margin-bottom:8px">Become a Creator</h1>
  <p style="color:var(--text-2);margin-bottom:20px;max-width:60ch">Apply to join our agency roster. Tell us about your channels, platforms, and why Northline is the right home for your career.</p>
  <div class="card">
    <form id="creatorForm" onsubmit="return false;">
      <div class="form-grid">
        <div>
          <label for="name">Full name</label>
          <input id="name" class="input" type="text" placeholder="Your name" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" class="input" type="email" placeholder="you@email.com" required>
        </div>
        <div>
          <label for="platform">Primary platform</label>
          <input id="platform" class="input" type="text" placeholder="Twitch / YouTube / TikTok">
        </div>
        <div>
          <label for="category">Game / Category</label>
          <input id="category" class="input" type="text" placeholder="FPS / Racing / Variety">
        </div>
        <div>
          <label for="followers">Follower count (approx)</label>
          <input id="followers" class="input" type="text" placeholder="e.g. 120000">
        </div>
        <div>
          <label for="handles">Social links</label>
          <input id="handles" class="input" type="text" placeholder="Twitch, Twitter, YouTube URLs">
        </div>
      </div>
      <div style="margin-top:12px">
        <label for="why">Why Northline? (brief)</label>
        <textarea id="why" rows="5" class="input" placeholder="Tell us why you'd be a fit"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="submitCreator()">Submit Application</button>
        <div id="result" class="help" role="status" aria-live="polite" style="display:none"></div>
      </div>
    </form>
  </div>
</div>
<footer style="border-top:1px solid var(--border);padding:32px var(--edge);margin-top:40px">
  <div class="wrap">
    <div class="footer-top" style="display:grid;grid-template-columns:1fr 320px;gap:18px;padding-bottom:18px;border-bottom:1px solid rgba(0,0,0,0.06);margin-bottom:16px">
      <div>
        <div>© 2026 Northline</div>
      </div>
      <div>
        <div class="ad-slot">Ad placeholder — 300×250</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center"><div></div><div style="display:flex;gap:10px"><a href="#">X</a><a href="#">DC</a><a href="#">IG</a></div></div>
  </div>
</footer>
<script>
function submitCreator(){
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const result = document.getElementById('result');
  if(!name || !email.includes('@')){ result.style.display='block'; result.textContent='Please enter name and valid email.'; return }
  result.style.display='block'; result.textContent='Application received. We\'ll review and reply within 2-3 weeks.';
  document.getElementById('creatorForm').reset();
}
const nav = document.getElementById('mainNav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>20),{passive:true});
</script>
<script src="cookie-consent.js"></script>
</body>
</html>
